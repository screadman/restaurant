<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Saucellerie - Création de compte</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/authentification.css">
</head>
<body>
    <div class="container my-5">
        <div class="row justify-content-center g-0">
            <div class="col-md-10 col-lg-10 d-flex bg-light rounded my-5 overflow-hidden">
                <div class="col-md-6 d-none d-md-block p-0 ">
                    <img src="images/signIn.avif" class="img-fluid w-100 h-100 object-fit-cover rounded-start" alt="Image de plats">
                </div>
                <div class="col-md-6 p-5 my-5">
                    <h2 class="mb-4"><span class="icon">🍽️</span> La Saucellerie</h2>
                    <h4 class="mb-4">Authentification</h4>
                    <form id="signinForm">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" required>
                        </div>
                        <div class="mb-3 position-relative">
                            <label for="password" class="form-label">Mot de passe</label>
                            <input type="password" class="form-control" id="password" required>
                            <i id="togglePassword" class="bi bi-eye-slash position-absolute" style="top: 70%; right: 10px; transform: translateY(-50%); cursor: pointer;"></i>
                        </div>
                        <button type="submit" class="btn btn-dark w-100">Se connecter</button>
                        <div class="text-center mt-3">
                            <a href="signUp.html" class="text-muted">Créer un compte</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/signIn.js"></script>
</body>
</html>

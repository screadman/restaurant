<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Reservation</title>
    <meta name="author" content="Steven ATCHALL, Frank Brice Yitemben Kameni, Théo Pouna Brenam, et Raoul Pharel LEKANE">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Luxurious+Roman&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/specifique.css">
    <link rel="stylesheet" href="css/reserver.css">
    
</head>
<body onload="afficherReservation()">
    <nav id="nav">
        <ul>
            <li><a href="index.html#top">Acceuil</a></li>
            <li><a href="menu.html">menu</a></li>
            <li><a href="aProposDeNous.html">À propos de nous</a></li>
            <li><a href="#haut">Reservation</a></li>
            <li>
                <a href="recherche.html">
                    <i class="fa fa-search"></i>
                </a>
            </li>
        </ul>
    </nav>
    <main>
    <div class="row">
        <div class=" col-lg-9">
            <div id="panier" class="container my-5">
                <h1 id="titrePanierVide" class="text-center text-danger">Votre panier est vide</h1>
            </div>
            <div class="container text-end my-5">
                <button id="boutonEffacer" type="button" class="btn btn-success d-none"
                    onclick="viderPanier()">Vider le
                    panier</button>
            </div>
        </div>
        <div id="total" class="col-lg-3 d-none mt-4 bg-light p-3 rounded shadow-sm">
            <div id="contenu">
                <h4 class="text-primary">Détails du Total</h4>
                <div class="d-flex justify-content-between my-2">
                    <p class="fw-bold">Total :</p>
                    <label id="prixTotal" class="text-end"></label>
                </div>
                <div class="d-flex justify-content-between my-2">
                    <p class="fw-bold">Réduction :</p>
                    <label id="reduction" class="text-end"></label>
                </div>
                <hr>
                <div class="d-flex justify-content-between my-2">
                    <p class="fw-bold">Total à Payer :</p>
                    <label id="totalPayer" class="text-end"></label>
                </div>
                <div class="text-center mt-3">
                    <button class="btn btn-outline-success w-100 mb-2" type="button">Passer au paiement</button>
                    <div class="text-muted">
                        <i class="fa-brands fa-cc-visa mx-1 text-primary"></i>
                        <i class="fa-brands fa-cc-mastercard mx-1 text-danger"></i>
                        <i class="fa-brands fa-cc-paypal mx-1 text-warning"></i>
                    </div>
                    <button id="imprimer" class="btn btn-outline-secondary w-100 mt-2">Imprimer</button>
                </div>
            </div>
        </div>
    </main>
    <footer id="pied">
        <div class="bas">
            <h2>Nous contacter</h2>
            <i class="fa-brands fa-facebook"></i>
            <i class="fa-brands fa-x-twitter"></i>
            <i class="fa-brands fa-instagram"></i>
        </div>
        <div class="bas">
            <h2 style="color: white">205 rue Monseigneur-Bourget, Lévis, QC G6V 6Z9</h2>
        </div>
        <a href="#top">
            <span class="fas fa-arrow-alt-circle-up" id="to_top"></span>
        </a>
    </footer>
    <script src="https://printjs-4de6.kxcdn.com/print.min.js"></script>
    <script src="https://kit.fontawesome.com/d6973d5988.js" crossorigin="anonymous"></script>
    <script src="js/reservation.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Saucellerie - Création de compte</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/authentification.css">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center g-0">
            <div class="col-md-10 col-lg-10 d-flex bg-light rounded my-5 overflow-hidden">
                <div class="col-md-6 d-none d-md-block p-0">
                    <img src="images/authentification.jpg" class="img-fluid w-100 h-100 object-fit-cover rounded-start" alt="Image de plats">
                </div>
                <div class="col-md-6 p-4">
                    <h2 class="mb-4"><span class="icon">🍽️</span> La Saucellerie</h2>
                    <h4 class="mb-4">Création de compte</h4>
                    <form id="signupForm">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="text" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="mb-3 position-relative">
                            <label for="password" class="form-label">Mot de passe</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                            <i id="togglePassword1" class="bi bi-eye-slash position-absolute" style="top: 70%; right: 10px; transform: translateY(-50%); cursor: pointer;"></i>
                        </div>
                        <div class="mb-3 position-relative">
                            <label for="confirmPassword" class="form-label">Confirmation du mot de passe</label>
                            <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
                            <i id="togglePassword2" class="bi bi-eye-slash position-absolute" style="top: 70%; right: 10px; transform: translateY(-50%); cursor: pointer;"></i>
                        </div>

                        <div class="mb-3 captcha-container text-center">
                            <canvas id="captchaCanvas" width="150" height="50"></canvas>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">La réponse est :</label>
                            <input type="text" id="captchaAnswer" name="captchaAnswer" class="form-control d-inline-block w-auto ms-2" required>
                        </div>
                        

                        <button type="submit" class="btn btn-dark w-100">Créer un compte</button>
                        
                        <div class="text-center mt-3">
                            <a href="signIn.html" class="text-muted">Se connecter</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/signUp.js"></script>
    <script src="js/captcha.js"></script>
    
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Saucellerie - Validation 2FA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/authentification.css">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center g-0">
            <div class="col-md-10 col-lg-10 d-flex bg-light rounded my-5 overflow-hidden">
                <div class="col-md-6 d-none d-md-block p-0">
                    <!-- Garder la même image ou une image similaire -->
                    <img src="images/authentification.jpg" class="img-fluid w-100 h-100 object-fit-cover rounded-start" alt="Image de plats">
                </div>
                <div class="col-md-6 p-4">
                    <h2 class="mb-4"><span class="icon">🍽️</span> La Saucellerie</h2>
                    <h4 class="mb-4">Validation du Code 2FA</h4>
                    <p class="text-muted">Veuillez saisir le code d'authentification envoyé à votre adresse e-mail.</p>
                    <form id="twoFactorForm">
                        <div class="mb-3">
                            <label for="authCode" class="form-label">Code d'authentification</label>
                            <input type="text" class="form-control" id="authCode" name="authCode" maxlength="6" required>
                        </div>
                        <button type="submit" class="btn btn-dark w-100">Valider</button>
                        <div class="text-center mt-3">
                            <a href="resendCode.html" class="text-muted">Renvoyer le code</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/validation.js"></script>
</body>
</html>
